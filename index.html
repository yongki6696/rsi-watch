<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RSI Watch">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>RSI Watch</title>
<style>
:root {
  --bg:#000000;
  --surface:#0a0a0a;
  --card:#111111;
  --card2:#181818;
  --border:#242424;
  --accent:#2563eb;
  --accent2:#3b82f6;
  --danger:#ef4444;
  --warn:#f59e0b;
  --ok:#22c55e;
  --text:#ffffff;
  --text2:#a0a0a0;
  --muted:#505050;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  min-height:100vh; overscroll-behavior:none;
}

/* ── 헤더 ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(env(safe-area-inset-top) + 16px) 20px 16px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.logo { display:flex; align-items:center; gap:9px; }
.logo-dot { width:8px; height:8px; border-radius:50%; background:var(--accent2); box-shadow:0 0 8px var(--accent2); animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.logo-title { font-size:17px; font-weight:700; letter-spacing:-.3px; }

.btn-refresh {
  display:flex; align-items:center; gap:6px;
  background:var(--card2); border:1px solid var(--border);
  border-radius:20px; padding:8px 16px;
  color:var(--text); font-size:13px; font-weight:600;
  cursor:pointer; touch-action:manipulation;
  transition:background .15s, transform .1s;
  -webkit-appearance:none;
}
.btn-refresh:active { background:#222; transform:scale(0.96); }
.alert-badge {
  background:var(--danger); color:#fff;
  font-size:11px; font-weight:700;
  padding:2px 7px; border-radius:20px; display:none;
}

/* ── 메인 ── */
main {
  max-width:680px; margin:0 auto;
  padding:20px 16px calc(env(safe-area-inset-bottom) + 36px);
}

/* ── 배너 ── */
.banner {
  border-radius:12px; padding:11px 14px; margin-bottom:14px;
  font-size:13px; display:flex; justify-content:space-between;
  align-items:center; gap:10px; line-height:1.4;
}
.banner-blue   { background:rgba(37,99,235,.12); border:1px solid rgba(37,99,235,.3); }
.banner-yellow { background:rgba(245,158,11,.1);  border:1px solid rgba(245,158,11,.25); }
.hidden { display:none !important; }

/* ── 통계 ── */
.stats { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
.stat {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:14px 16px;
}
.stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; }
.stat-big { font-size:28px; font-weight:700; font-variant-numeric:tabular-nums; }
.stat-sm  { font-size:13px; font-weight:600; line-height:1.5; }

/* ── 입력 패널 ── */
.panel {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:16px; margin-bottom:12px;
}
.row { display:flex; gap:10px; margin-bottom:10px; }
.field { display:flex; flex-direction:column; gap:5px; flex:1; }
.field-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; }
.field input, .field select {
  background:var(--card2); border:1px solid var(--border);
  border-radius:10px; padding:12px 13px;
  color:var(--text); font-size:15px;
  outline:none; width:100%; -webkit-appearance:none; appearance:none;
}
.field input:focus, .field select:focus { border-color:var(--accent2); }
.field input::placeholder { color:var(--muted); }
.btn-add {
  flex:1; height:46px; background:var(--accent); color:#fff;
  border:none; border-radius:10px; font-size:15px; font-weight:700;
  cursor:pointer; touch-action:manipulation; -webkit-appearance:none;
  transition:background .15s, transform .1s;
}
.btn-add:active { background:#1d4ed8; transform:scale(0.96); }

/* ── 임계값 ── */
.thr-panel {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:14px 16px; margin-bottom:20px;
}
.thr-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.thr-label { font-size:13px; color:var(--text2); }
.thr-val { font-size:24px; font-weight:700; color:var(--danger); font-variant-numeric:tabular-nums; }
input[type=range] { width:100%; accent-color:var(--danger); cursor:pointer; height:4px; }

/* ── 섹션 헤더 ── */
.sec-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding:0 2px; }
.sec-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.9px; }
.sec-sub   { font-size:10px; color:var(--muted); }

/* ── 빈 상태 ── */
.empty { text-align:center; padding:52px 20px; }
.empty-icon  { font-size:44px; margin-bottom:14px; }
.empty-title { font-size:17px; font-weight:600; margin-bottom:7px; }
.empty-desc  { font-size:13px; color:var(--text2); line-height:1.6; }

/* ── 종목 카드 ── */
.cards { display:flex; flex-direction:column; gap:10px; }
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:16px 18px;
  transition:border-color .2s, box-shadow .2s;
}
.card.s-alert { border-color:var(--danger); box-shadow:0 0 0 1px var(--danger), 0 0 20px rgba(239,68,68,.1); }
.card.s-warn  { border-color:var(--warn);   box-shadow:0 0 0 1px var(--warn),   0 0 20px rgba(245,158,11,.07); }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.ticker { font-size:21px; font-weight:700; letter-spacing:.2px; }
.cname  { font-size:11px; color:var(--text2); margin-top:3px; max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-right { display:flex; align-items:center; gap:8px; }

.badge { padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; text-transform:uppercase; }
.b-alert{ background:rgba(239,68,68,.18);   color:#ff6b6b; }
.b-warn { background:rgba(245,158,11,.18);  color:#fbbf24; }
.b-ok   { background:rgba(34,197,94,.15);   color:#4ade80; }
.b-high { background:rgba(139,92,246,.15);  color:#a78bfa; }
.b-load { background:rgba(80,80,80,.2);     color:var(--muted); }
.b-err  { background:rgba(239,68,68,.1);    color:var(--danger); }

.card-body { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:14px; }
.price-main { font-size:24px; font-weight:700; letter-spacing:-.3px; }
.price-chg  { font-size:12px; margin-top:3px; font-weight:500; }
.rsi-label-sm { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; text-align:right; }
.rsi-big { font-size:36px; font-weight:700; line-height:1; text-align:right; letter-spacing:-.5px; }

.bar-wrap { position:relative; height:4px; background:var(--border); border-radius:2px; margin-bottom:12px; overflow:visible; }
.bar-fill { height:100%; border-radius:2px; transition:width .5s ease; }
.bar-mark { position:absolute; top:-5px; width:2px; height:14px; background:var(--danger); border-radius:1px; opacity:.6; }

.card-foot {
  display:flex; justify-content:space-between;
  font-size:11px; color:var(--muted);
  border-top:1px solid var(--border); padding-top:10px;
}

/* ── 색상 ── */
.c-white{color:#fff} .c-danger{color:var(--danger)} .c-warn{color:var(--warn)} .c-ok{color:var(--ok)} .c-purple{color:#a78bfa} .c-muted{color:var(--muted)} .c-text2{color:var(--text2)}

/* ── 스피너 ── */
.spin { display:inline-block; width:15px; height:15px; border:2px solid var(--border); border-top-color:var(--accent2); border-radius:50%; animation:sp .7s linear infinite; vertical-align:middle; }
@keyframes sp { to{transform:rotate(360deg)} }

/* ── 삭제 버튼 ── */
.btn-del {
  background:rgba(239,68,68,.12); color:var(--danger);
  border:none; border-radius:8px; padding:5px 10px; font-size:13px;
  cursor:pointer; touch-action:manipulation;
}
.btn-del:active { background:rgba(239,68,68,.25); }

/* ── 토스트 ── */
#toasts {
  position:fixed; top:calc(env(safe-area-inset-top)+76px);
  right:16px; left:16px; z-index:999;
  display:flex; flex-direction:column; gap:8px; pointer-events:none;
}
.toast {
  background:#1a0808; border:1px solid var(--danger);
  border-radius:14px; padding:13px 16px;
  display:flex; gap:10px; align-items:flex-start;
  box-shadow:0 4px 24px rgba(239,68,68,.18);
  animation:tin .22s ease; pointer-events:auto;
}
.toast.info { background:#08091a; border-color:var(--accent2); box-shadow:0 4px 24px rgba(59,130,246,.12); }
.toast.ok   { background:#081408; border-color:var(--ok);      box-shadow:0 4px 24px rgba(34,197,94,.1); }
@keyframes tin { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.t-icon  { font-size:17px; flex-shrink:0; }
.t-title { font-size:13px; font-weight:700; color:var(--danger); }
.toast.info .t-title { color:var(--accent2); }
.toast.ok   .t-title { color:var(--ok); }
.t-msg   { font-size:11px; color:var(--text2); margin-top:2px; }

/* ── 허용 버튼 ── */
.btn-allow {
  background:var(--accent); color:#fff; border:none;
  border-radius:8px; padding:7px 13px; font-size:12px; font-weight:700;
  cursor:pointer; white-space:nowrap; touch-action:manipulation;
}
.btn-allow:active { background:#1d4ed8; }
.btn-x {
  background:transparent; color:var(--muted); border:1px solid var(--border);
  border-radius:8px; padding:5px 10px; font-size:12px; cursor:pointer;
  touch-action:manipulation;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-title">RSI Watch</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="alert-badge" id="alert-badge">0</span>
    <button class="btn-refresh" id="btn-refresh">
      <span>⟳</span><span>새로고침</span>
    </button>
  </div>
</header>

<div id="toasts"></div>

<main>
  <!-- 홈화면 추가 배너 -->
  <div class="banner banner-blue hidden" id="pwa-banner">
    <span>📲 홈화면 앱: <b>공유 → 홈 화면에 추가</b></span>
    <button class="btn-x" id="btn-pwa-close">✕</button>
  </div>
  <!-- 알림 배너 -->
  <div class="banner banner-yellow hidden" id="notif-banner">
    <span>🔔 RSI 경보를 알림으로 받으려면 허용해주세요</span>
    <button class="btn-allow" id="btn-notif">허용</button>
  </div>

  <!-- 통계 -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">감시 종목</div>
      <div class="stat-big c-white" id="s-total">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">RSI 경보</div>
      <div class="stat-big c-danger" id="s-alert">0</div>
    </div>
    <div class="stat" style="grid-column:span 2">
      <div class="stat-label">마지막 업데이트</div>
      <div class="stat-sm c-muted" id="s-lastup" style="padding-top:4px">—</div>
    </div>
  </div>

  <!-- 입력 -->
  <div class="panel">
    <div class="row">
      <div class="field" style="flex:2">
        <div class="field-label">티커 심볼</div>
        <input id="inp-ticker" type="text" placeholder="AAPL"
               maxlength="10" autocomplete="off" autocorrect="off"
               autocapitalize="characters" spellcheck="false">
      </div>
      <div class="field" style="flex:1">
        <div class="field-label">기간</div>
        <select id="inp-period">
          <option value="1d">일봉</option>
          <option value="1wk">주봉</option>
          <option value="1mo">월봉</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:flex-end">
      <div class="field" style="flex:2">
        <div class="field-label">자동 새로고침</div>
        <select id="inp-interval">
          <option value="0">끄기</option>
          <option value="60">1분</option>
          <option value="300" selected>5분</option>
          <option value="600">10분</option>
          <option value="1800">30분</option>
        </select>
      </div>
      <button class="btn-add" id="btn-add" style="flex:1">+ 추가</button>
    </div>
  </div>

  <!-- 임계값 -->
  <div class="thr-panel">
    <div class="thr-top">
      <span class="thr-label">🔴 RSI 알림 임계값</span>
      <span class="thr-val" id="thr-display">30</span>
    </div>
    <input type="range" id="inp-threshold" min="10" max="50" value="30">
  </div>

  <!-- 감시 목록 -->
  <div class="sec-header">
    <div class="sec-title">감시 목록</div>
    <div class="sec-sub" id="next-refresh"></div>
  </div>
  <div class="cards" id="cards">
    <div class="empty" id="empty">
      <div class="empty-icon">📈</div>
      <div class="empty-title">감시할 종목을 추가하세요</div>
      <div class="empty-desc">티커 심볼 입력 후 + 추가 버튼을 눌러주세요<br>RSI가 임계값 이하로 내려가면 즉시 알림이 옵니다</div>
    </div>
  </div>
</main>

<script>
'use strict';

// ── 상태 ──
var stocks    = [];
var threshold = parseInt(localStorage.getItem('rsi_thr') || '30');
var prevAlert = new Set(JSON.parse(localStorage.getItem('rsi_prev') || '[]'));
var autoTimer = null;
var autoRem   = 0;

// ── 마이그레이션 (이전 기간 형식 통일) ──
function migratePeriod(p) {
  return {'1day':'1d','1week':'1wk','1month':'1mo','D':'1d','W':'1wk','M':'1mo'}[p] || p;
}
function migrateStocks() {
  var saved = [];
  try { saved = JSON.parse(localStorage.getItem('rsi_stocks')||'[]'); } catch(e){}
  var changed = false;
  saved = saved.map(function(s){
    var np = migratePeriod(s.period);
    if (np!==s.period){ s.period=np; changed=true; }
    return s;
  });
  if (changed) localStorage.setItem('rsi_stocks', JSON.stringify(saved));
  return saved;
}

// ── 마지막 업데이트 ──
function renderLastUpdate(t) {
  var el = document.getElementById('s-lastup'); if(!el) return;
  if (!t) { el.textContent='—'; el.className='stat-sm c-muted'; return; }
  el.textContent = t.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.className = 'stat-sm c-white';
}

// ── 토스트 ──
function toast(icon, title, msg, type, ms) {
  ms=ms||5000; type=type||'alert';
  var c=document.getElementById('toasts');
  var d=document.createElement('div');
  d.className='toast'+(type==='info'?' info':type==='ok'?' ok':'');
  d.innerHTML='<div class="t-icon">'+icon+'</div><div><div class="t-title">'+title+'</div><div class="t-msg">'+msg+'</div></div>';
  c.insertBefore(d,c.firstChild);
  setTimeout(function(){ d.style.opacity='0'; d.style.transition='opacity .35s'; setTimeout(function(){ d.parentNode&&d.parentNode.removeChild(d); },380); },ms);
}

// ══════════════════════════════════════════
// Yahoo Finance — 프록시 폴백 체인
// ══════════════════════════════════════════
var RANGE = {'1d':'2y','1wk':'5y','1mo':'10y'};

function fetchYahoo(ticker, period) {
  // 캐시 방지 타임스탬프
  var ts  = Date.now();
  var url = 'https://query1.finance.yahoo.com/v8/finance/chart/'
    + encodeURIComponent(ticker)
    + '?interval=' + period + '&range=' + RANGE[period] + '&t=' + ts;

  // 프록시 순서대로 시도
  return tryNext(url, [
    'https://corsproxy.io/?url=' + encodeURIComponent(url),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    'https://api.allorigins.win/get?url=' + encodeURIComponent(url),
    'https://thingproxy.freeboard.io/fetch/' + url,
  ], 0);
}

function tryNext(orig, proxies, i) {
  if (i >= proxies.length) return Promise.reject(new Error('데이터 로드 실패'));
  return fetch(proxies[i], { signal: AbortSignal.timeout ? AbortSignal.timeout(9000) : undefined })
  .then(function(r){
    if (!r.ok) throw new Error('HTTP '+r.status);
    return r.text();
  })
  .then(function(txt){
    var obj;
    try { obj = JSON.parse(txt); } catch(e){ throw new Error('파싱 실패'); }
    // allorigins /get 래핑 처리
    if (obj && obj.contents) try { obj = JSON.parse(obj.contents); } catch(e){}
    if (!obj||!obj.chart||!obj.chart.result||!obj.chart.result[0]) throw new Error('데이터 없음');
    return obj;
  })
  .catch(function(){ return tryNext(orig, proxies, i+1); });
}

// ── RSI 계산 (Wilder 스무딩, 14기간) ──
function calcRSI(closes) {
  var c = closes.filter(function(v){ return v!=null&&!isNaN(v); });
  if (c.length < 15) return null;
  var g=0, l=0, p=14;
  for (var i=1;i<=p;i++){ var d=c[i]-c[i-1]; if(d>0)g+=d; else l-=d; }
  var ag=g/p, al=l/p;
  for (var i=p+1;i<c.length;i++){
    var d=c[i]-c[i-1];
    ag=(ag*(p-1)+(d>0?d:0))/p;
    al=(al*(p-1)+(d<0?-d:0))/p;
  }
  if(al===0) return 100;
  return Math.round((100-100/(1+ag/al))*100)/100;
}

// ── 종목 로드 ──
function loadStock(s) {
  s.loading=true; s.error=null; renderCard(s);
  return fetchYahoo(s.ticker, s.period)
  .then(function(data){
    var chart  = data.chart.result[0];
    var closes = chart.indicators.quote[0].close;
    s.rsi      = calcRSI(closes);
    var valid  = closes.filter(function(v){ return v!=null; });
    s.price    = valid[valid.length-1];
    s.prevClose= valid[valid.length-2];
    s.name     = (chart.meta&&(chart.meta.longName||chart.meta.shortName))||'';
    s.loading  = false; s.error=null; s.lastUp=new Date();
    renderLastUpdate(s.lastUp);
  })
  .catch(function(e){ s.loading=false; s.error=e.message; })
  .then(function(){ renderCard(s); checkAlert(s); updateStats(); });
}

// ── 전체 새로고침 ──
function refreshAll() {
  if (!stocks.length){ toast('ℹ️','종목 없음','먼저 종목을 추가해주세요','info'); return; }
  var btn=document.getElementById('btn-refresh');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> 로딩중';
  var idx=0;
  function next(){
    if(idx>=stocks.length){ btn.disabled=false; btn.innerHTML='<span>⟳</span><span>새로고침</span>'; return; }
    loadStock(stocks[idx++]).then(function(){ setTimeout(next,800); });
  }
  next();
}

// ── 알림 ──
function checkAlert(s){
  if(s.rsi==null) return;
  var key=s.ticker+'_'+s.period;
  if(s.rsi<=threshold){
    if(!prevAlert.has(key)){
      prevAlert.add(key);
      localStorage.setItem('rsi_prev',JSON.stringify(Array.from(prevAlert)));
      fireAlert(s);
    }
  } else {
    prevAlert.delete(key);
    localStorage.setItem('rsi_prev',JSON.stringify(Array.from(prevAlert)));
  }
}
function fireAlert(s){
  if(typeof Notification!=='undefined'&&Notification.permission==='granted'){
    try{ new Notification('🚨 '+s.ticker+' RSI 경보',{body:'RSI '+s.rsi+' ← 임계값 '+threshold+' 이하!',icon:'icon-192.png',tag:'rsi-'+s.ticker}); }catch(e){}
  }
  toast('🚨',s.ticker+' RSI 경보','RSI '+s.rsi+' — 임계값 '+threshold+' 이하 진입!','alert',8000);
}

// ── 카드 렌더링 ──
function rsiColor(v){ if(v==null)return 'c-muted'; if(v<=threshold)return 'c-danger'; if(v<=40)return 'c-warn'; if(v<=60)return 'c-ok'; return 'c-purple'; }
function barColor(v){ if(v==null)return '#242424'; if(v<=threshold)return '#ef4444'; if(v<=40)return '#f59e0b'; if(v<=60)return '#22c55e'; return '#a78bfa'; }
function getBadge(v,err){
  if(err) return '<span class="badge b-err">오류</span>';
  if(v==null) return '<span class="badge b-load"><span class="spin"></span></span>';
  if(v<=threshold) return '<span class="badge b-alert">🚨 경보</span>';
  if(v<=40) return '<span class="badge b-warn">⚠ 주의</span>';
  if(v<=60) return '<span class="badge b-ok">정상</span>';
  return '<span class="badge b-high">과매수</span>';
}
function cardCls(v){ if(v==null)return ''; if(v<=threshold)return 's-alert'; if(v<=40)return 's-warn'; return ''; }
function pLabel(p){ return p==='1d'?'일봉':p==='1wk'?'주봉':'월봉'; }

function renderCard(s){
  var el=document.getElementById('card-'+s.ticker+'-'+s.period); if(!el) return;
  var v=s.rsi, pct=v!=null?Math.min(v,100):0;
  var chg=(s.price&&s.prevClose)?((s.price-s.prevClose)/s.prevClose*100).toFixed(2):null;
  var isUp=chg&&parseFloat(chg)>=0;
  var chgHTML=chg?'<div class="price-chg '+(isUp?'c-ok':'c-danger')+'">'+(isUp?'▲+':'▼')+chg+'%</div>':'';
  var priceHTML=s.price
    ?'<div class="price-main">$'+s.price.toFixed(2)+'</div>'+chgHTML
    :(s.loading?'<div class="price-main"><span class="spin"></span></div>':'<div class="price-main c-muted">—</div>');
  var rsiHTML=v!=null
    ?'<div class="rsi-big '+rsiColor(v)+'">'+v+'</div>'
    :(s.loading?'<div class="rsi-big"><span class="spin"></span></div>':'<div class="rsi-big c-muted">—</div>');
  var timeStr=s.lastUp?'🕐 '+s.lastUp.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'';
  var footRight=s.error?'<span class="c-danger">⚠ '+s.error+'</span>':timeStr;

  el.className='card '+cardCls(v);
  el.innerHTML=
    '<div class="card-top">'
    +'<div><div class="ticker">'+s.ticker+'</div>'+(s.name?'<div class="cname">'+s.name+'</div>':'')+'</div>'
    +'<div class="card-right">'+getBadge(v,s.error)
    +'<button class="btn-del" data-ticker="'+s.ticker+'" data-period="'+s.period+'">✕</button>'
    +'</div></div>'
    +'<div class="card-body">'
    +'<div>'+priceHTML+'</div>'
    +'<div><div class="rsi-label-sm">RSI(14) · '+pLabel(s.period)+'</div>'+rsiHTML+'</div>'
    +'</div>'
    +'<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+barColor(v)+'"></div>'
    +'<div class="bar-mark" style="left:'+threshold+'%"></div></div>'
    +'<div class="card-foot"><span>'+pLabel(s.period)+'</span><span>'+footRight+'</span></div>';
}

// 삭제 — 이벤트 위임
document.getElementById('cards').addEventListener('click',function(e){
  var b=e.target.closest('[data-ticker]'); if(!b) return;
  removeStock(b.dataset.ticker,b.dataset.period);
});

// ── 통계 ──
function updateStats(){
  document.getElementById('s-total').textContent=stocks.length;
  var n=stocks.filter(function(s){ return s.rsi!=null&&s.rsi<=threshold; }).length;
  document.getElementById('s-alert').textContent=n;
  var b=document.getElementById('alert-badge');
  b.textContent=n; b.style.display=n>0?'inline-block':'none';
}

// ── 추가 / 삭제 / 저장 ──
function addStock(){
  var raw=document.getElementById('inp-ticker').value.trim().toUpperCase().replace(/[^A-Z0-9.\-\^]/g,'');
  var period=document.getElementById('inp-period').value;
  if(!raw){ toast('⚠️','티커 없음','예: AAPL TSLA QLD NVDL','info'); return; }
  if(stocks.find(function(s){ return s.ticker===raw&&s.period===period; })){
    toast('ℹ️','이미 있음',raw+' ('+pLabel(period)+') 은 이미 목록에 있어요','info'); return;
  }
  var s={ticker:raw,period:period,rsi:null,price:null,prevClose:null,name:'',loading:true,error:null,lastUp:null};
  stocks.push(s); save();
  document.getElementById('empty').style.display='none';
  var el=document.createElement('div'); el.id='card-'+raw+'-'+period; el.className='card';
  document.getElementById('cards').appendChild(el);
  renderCard(s); updateStats();
  toast('✅',raw+' 추가됨','데이터 로딩 중…','ok',3000);
  document.getElementById('inp-ticker').value='';
  loadStock(s);
}
function removeStock(ticker,period){
  stocks=stocks.filter(function(s){ return !(s.ticker===ticker&&s.period===period); });
  var el=document.getElementById('card-'+ticker+'-'+period);
  if(el) el.parentNode.removeChild(el);
  save();
  if(!stocks.length) document.getElementById('empty').style.display='block';
  updateStats();
}
function save(){ localStorage.setItem('rsi_stocks',JSON.stringify(stocks.map(function(s){ return {ticker:s.ticker,period:s.period}; }))); }

// ── 자동 새로고침 ──
function setupAutoRefresh(){
  if(autoTimer) clearInterval(autoTimer);
  var sec=parseInt(document.getElementById('inp-interval').value);
  var lbl=document.getElementById('next-refresh');
  if(sec===0){ lbl.textContent='자동 꺼짐'; return; }
  autoRem=sec; lbl.textContent=autoRem+'초 후 업데이트';
  autoTimer=setInterval(function(){
    autoRem--; lbl.textContent=autoRem+'초 후 업데이트';
    if(autoRem<=0){ autoRem=sec; refreshAll(); }
  },1000);
}

// ── 임계값 ──
function updateThreshold(val){
  threshold=parseInt(val);
  document.getElementById('thr-display').textContent=threshold;
  localStorage.setItem('rsi_thr',threshold);
  stocks.forEach(function(s){ renderCard(s); }); updateStats();
}

// ── 알림 권한 ──
function requestNotif(){
  if(typeof Notification==='undefined'){
    toast('ℹ️','알림 미지원','화면 토스트로 알려드립니다','info');
    document.getElementById('notif-banner').classList.add('hidden'); return;
  }
  Notification.requestPermission().then(function(p){
    document.getElementById('notif-banner').classList.add('hidden');
    if(p==='granted') toast('✅','알림 허용','RSI 경보를 알림으로 받습니다','ok');
    else toast('ℹ️','알림 거부','화면 토스트로 알려드립니다','info');
  });
}

// ── 버튼 바인딩 (iOS 대응) ──
function bindBtn(id,fn){
  var el=document.getElementById(id); if(!el) return;
  var lock=false;
  function run(e){ if(e.cancelable)e.preventDefault(); if(lock)return; lock=true; fn(); setTimeout(function(){lock=false;},350); }
  el.addEventListener('touchend',run,{passive:false});
  el.addEventListener('click',run);
}
bindBtn('btn-add',addStock);
bindBtn('btn-refresh',refreshAll);
bindBtn('btn-notif',requestNotif);
bindBtn('btn-pwa-close',function(){ document.getElementById('pwa-banner').classList.add('hidden'); });
document.getElementById('inp-ticker').addEventListener('keydown',function(e){ if(e.key==='Enter'){e.preventDefault();addStock();} });
document.getElementById('inp-interval').addEventListener('change',setupAutoRefresh);
document.getElementById('inp-threshold').addEventListener('input',function(){ updateThreshold(this.value); });

// ── Service Worker ──
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){ navigator.serviceWorker.register('./sw.js').catch(function(){}); });
}

// ── 배너 체크 ──
function checkBanners(){
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  var isSA=(window.navigator.standalone===true)||window.matchMedia('(display-mode: standalone)').matches;
  if(isIOS&&!isSA) document.getElementById('pwa-banner').classList.remove('hidden');
  if(typeof Notification!=='undefined'&&Notification.permission==='default')
    document.getElementById('notif-banner').classList.remove('hidden');
}

// ── 초기화 ──
(function init(){
  document.getElementById('inp-threshold').value=threshold;
  document.getElementById('thr-display').textContent=threshold;
  checkBanners(); renderLastUpdate(null);

  var saved=migrateStocks();
  if(saved.length>0){
    document.getElementById('empty').style.display='none';
    saved.forEach(function(item){
      var s={ticker:item.ticker,period:item.period,rsi:null,price:null,prevClose:null,name:'',loading:true,error:null,lastUp:null};
      stocks.push(s);
      var el=document.createElement('div'); el.id='card-'+s.ticker+'-'+s.period; el.className='card';
      document.getElementById('cards').appendChild(el); renderCard(s);
    });
    updateStats();
    var i=0;
    function nextLoad(){ if(i>=stocks.length) return; loadStock(stocks[i++]).then(function(){ setTimeout(nextLoad,800); }); }
    nextLoad();
  }
  setupAutoRefresh();
})();
</script>
</body>
</html>
